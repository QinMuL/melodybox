version: "3.8"

services:
  melodybox:
    build: .  # 本地构建备选：docker compose build
    image: ghcr.io/qinmul/melodybox:latest  # 部署拉取最新版；回滚可改为具体版本号如 0.1.3
    container_name: melodybox
    restart: unless-stopped
    ports:
      - "28080:28080"
    volumes:
      # 音乐目录映射（支持多个目录，挂载到 /music/ 下不同子目录）
      # 后端会递归扫描 /music 下所有音频文件，无需改代码
      # 示例：NAS 上有 3 个音乐目录，分别挂载到 /music 下的子目录
      - /path/to/your/music1:/music/library1:rw
      - /path/to/your/music2:/music/library2:rw
      - /path/to/your/music3:/music/library3:rw
      # 如果只有一个目录，保留一行即可：
      # - /path/to/your/music:/music:rw
      # 数据持久化（SQLite 数据库）
      - ./data:/app/data:rw
    environment:
      - TZ=Asia/Shanghai
      - MUSIC_DATA_DIR=/app/data
      - MUSIC_INPUT_DIR=/music
      - MUSIC_OUTPUT_DIR=/music
      - MUSIC_RECYCLE_DIR=/app/data/recycle
      - DB_PATH=/app/data/melodybox.db
      - CONFIG_FILE=/app/data/config.json
      - LOG_LEVEL=info
    healthcheck:
      # 使用容器内已有的 python 做健康检查，避免依赖 curl
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:28080/health').close()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    # Docker 日志驱动轮转（防止 stdout 日志无限增长）
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
