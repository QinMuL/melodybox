name: Build and Push Docker Image

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  # 基础版本号，每次推送自动产生 <基础版本>.<构建号>，如 0.1.42
  BASE_VERSION: "0.1"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 登录 GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 计算自动递增版本号
        id: version
        run: |
          # 每次推送自动递增：0.1.<run_number>
          AUTO_VERSION="${BASE_VERSION}.${GITHUB_RUN_NUMBER}"
          echo "auto_version=${AUTO_VERSION}" >> $GITHUB_OUTPUT
          echo "::notice::本次构建版本: ${AUTO_VERSION} (构建号: ${GITHUB_RUN_NUMBER})"

      - name: 提取镜像元数据
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # 每次推送自动递增版本号：0.1.1, 0.1.2, 0.1.3 ...
            type=raw,value=${{ steps.version.outputs.auto_version }}

      - name: 构建并推送镜像
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
